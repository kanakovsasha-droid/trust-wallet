<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Trust</title>

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Trust" />
<meta name="theme-color" content="#0d0e10" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />
<link rel="manifest" href="manifest.webmanifest" />

<style>
  :root{
    --bg:#0d0e10;
    --green:#4ef595;
    --text:#fff;
    --muted:#9a9a9e;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;padding:0;background:#000;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;
  }

  /* ───────── Stage — screenshot.jpg is 1206×2622 ───────── */
  .stage{
    position:relative;
    width:100vw;
    aspect-ratio:1206 / 2622;
    margin:0 auto;
    background:url("screenshot.jpg") center/cover no-repeat var(--bg);
    overflow:hidden;
    container-type:size;
  }

  /* On phone: fill viewport */
  @media (max-width: 500px){
    body{background:var(--bg)}
    .stage{ width:100vw; min-height:100vh; }
  }

  /* On desktop: show in an iPhone frame */
  @media (min-width: 501px){
    body{
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:24px;
      background:#0a0a0a;
    }
    .stage{
      width:auto;
      height:min(900px, calc(100vh - 48px));
      aspect-ratio:1206 / 2622;
      border-radius:48px;
      border:10px solid #1a1a1a;
      box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px #2a2a2a;
    }
  }

  /* ───────── Overlays — measured PIXEL-EXACT from IMG_9273 ─────────
     Main "$0.00":  y=22.81%..27.08%, center 24.94%, height 4.27% of stage
     Sub  "$0.00 (0.00%)":  y=28.22%..29.67%, center 28.95%, height 1.45%
     Both centered horizontally at x=50%.
     Cap-height ≈ 0.72 × font-size, so:
       main font-size  ≈ 4.27 / 0.72 ≈ 5.93cqh
       sub  font-size  ≈ 1.45 / 0.72 ≈ 2.0cqh
  */

  .ovl-balance{
    position:absolute;
    left:0;right:0;
    top:23.6%;
    height:3.5%;
    z-index:10;
    display:flex;align-items:center;justify-content:center;
    background:transparent;     /* base is already blank — no mask needed */
    color:#fff;
    border:none;cursor:pointer;
    font-family:inherit;
    font-weight:600;
    letter-spacing:-0.025em;
    padding:0;
    overflow:visible;
  }
  .ovl-balance span{
    font-size:4.7cqh;
    white-space:nowrap;
    line-height:1;
    display:inline-block;
    transform-origin:center;
  }

  .ovl-sub{
    position:absolute;
    left:0;right:0;
    top:28.22%;
    height:1.45%;
    z-index:10;
    display:flex;align-items:center;justify-content:center;
    background:transparent;
    color:#9a9a9e;
    font-family:inherit;
    font-weight:400;
    pointer-events:none;
    overflow:visible;
  }
  .ovl-sub span.txt{
    font-size:2.0cqh;
    white-space:nowrap;
    line-height:1;
  }

  /* Invisible tap target on the gear icon — opens edit sheet */
  .tap-gear{
    position:absolute;
    left:3%;top:7%;
    width:13%;height:5%;
    z-index:11;
    background:transparent;
    border:none;cursor:pointer;
  }

  /* ───────── Edit sheet ───────── */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    display:none;align-items:flex-end;justify-content:center;
    z-index:50;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  }
  .modal-backdrop.open{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{
    width:100%;max-width:520px;
    background:#121214;
    border-radius:28px 28px 0 0;
    padding:14px 22px 32px;
    padding-bottom:calc(32px + env(safe-area-inset-bottom));
    animation:slide .28s cubic-bezier(.2,.8,.2,1);
    -webkit-user-select:auto;user-select:auto;
  }
  @keyframes slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet .grab{
    width:42px;height:5px;border-radius:3px;background:#3a3a3c;
    margin:0 auto 14px;
  }
  .sheet h2{margin:4px 0 4px;font-size:22px;font-weight:700}
  .sheet p.hint{margin:0 0 12px;color:#9a9a9e;font-size:14px}
  .field{margin-top:14px}
  .field label{display:block;font-size:13px;color:#9a9a9e;margin-bottom:8px;font-weight:500}
  .field input{
    width:100%;height:54px;border-radius:16px;
    background:#1e1e20;border:1px solid #2a2a2c;
    color:#fff;font-size:18px;padding:0 16px;
    font-family:inherit;font-weight:600;
    outline:none;
  }
  .field input:focus{border-color:var(--green)}
  .sheet .row{display:flex;gap:10px;margin-top:22px}
  .sheet .btn{
    flex:1;height:52px;border-radius:26px;border:none;cursor:pointer;
    font-size:16px;font-weight:700;font-family:inherit;
  }
  .sheet .btn.primary{background:var(--green);color:#0a0a0a}
  .sheet .btn.ghost{background:#1e1e20;color:#fff}

  /* install hint */
  .install-hint{
    position:fixed;left:12px;right:12px;bottom:18px;
    background:#1c1c1e;border:1px solid #2a2a2c;border-radius:16px;
    padding:12px 14px;display:none;align-items:center;gap:10px;z-index:80;
    font-size:13px;color:#ddd;
  }
  .install-hint.show{display:flex}
  .install-hint .close{margin-left:auto;background:none;border:none;color:#9a9a9e;font-size:18px;cursor:pointer}
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- Invisible tap target on the gear icon, opens the editor -->
  <button class="tap-gear" id="tapGear" aria-label="Edit balance"></button>

  <!-- Dynamic main balance, exactly where the original $0.00 sat -->
  <button class="ovl-balance" id="balanceBtn"><span id="balanceBig">$0.00</span></button>

  <!-- Dynamic sub-balance ($delta (%)) -->
  <div class="ovl-sub"><span class="txt"><span id="balanceDelta">$0.00</span>&nbsp;(<span id="balancePct">0.00</span>%)</span></div>
</div>

<!-- ───────── Edit sheet ───────── -->
<div class="modal-backdrop" id="modal">
  <form class="sheet" id="editForm">
    <div class="grab"></div>
    <h2>Изменить баланс</h2>
    <p class="hint">Введи сумму и процент изменения — сохранится на устройстве.</p>
    <div class="field">
      <label for="balInp">Баланс, $</label>
      <input id="balInp" type="text" inputmode="decimal" autocomplete="off" />
    </div>
    <div class="field">
      <label for="pctInp">Изменение (%)</label>
      <input id="pctInp" type="text" inputmode="decimal" autocomplete="off" />
    </div>
    <div class="row">
      <button type="button" class="btn ghost" id="cancelBtn">Отмена</button>
      <button type="submit" class="btn primary">Сохранить</button>
    </div>
  </form>
</div>

<div class="install-hint" id="installHint">
  <span>📲 Чтобы как приложение: <b>Поделиться</b> → <b>На экран «Домой»</b></span>
  <button class="close" id="closeHint">✕</button>
</div>

<script>
  const STORE_KEY = 'wallet-state-v2';
  const defaultState = { balance:0, pct:0 };
  const loadState = ()=>{ try{ return {...defaultState, ...JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}; }catch(e){ return {...defaultState}; } };
  const saveState = (s)=> localStorage.setItem(STORE_KEY, JSON.stringify(s));
  const state = loadState();

  const fmtMoney = (n)=>{
    const v = Number(n)||0;
    const sign = v < 0 ? '-' : '';
    return sign + '$' + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
  };
  const fmtPct = (n)=> (Number(n)||0).toFixed(2);

  function render(){
    const bigEl = document.getElementById('balanceBig');
    bigEl.textContent = fmtMoney(state.balance);
    const delta = (Number(state.balance)||0) * (Number(state.pct)||0) / 100;
    document.getElementById('balanceDelta').textContent = fmtMoney(delta);
    document.getElementById('balancePct').textContent = fmtPct(state.pct);
    // Auto-shrink long balance to fit stage width
    requestAnimationFrame(()=>{
      bigEl.style.transform = 'scale(1)';
      const stage = document.getElementById('stage');
      const avail = stage.clientWidth * 0.86;   // leave a margin
      const w = bigEl.scrollWidth;
      if (w > avail && w > 0){
        const k = avail / w;
        bigEl.style.transform = `scale(${k.toFixed(3)})`;
      }
    });
  }
  render();
  window.addEventListener('resize', render);

  const modal = document.getElementById('modal');
  const openEdit = ()=>{
    document.getElementById('balInp').value = state.balance;
    document.getElementById('pctInp').value = state.pct;
    modal.classList.add('open');
    setTimeout(()=> document.getElementById('balInp').focus(), 200);
  };
  const closeEdit = ()=> modal.classList.remove('open');

  document.getElementById('balanceBtn').addEventListener('click', openEdit);
  document.getElementById('tapGear').addEventListener('click', openEdit);
  document.getElementById('cancelBtn').addEventListener('click', closeEdit);
  modal.addEventListener('click', (e)=>{ if(e.target===modal) closeEdit(); });

  document.getElementById('editForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    const balRaw = document.getElementById('balInp').value.replace(/\s|\$|,/g,'');
    const pctRaw = document.getElementById('pctInp').value.replace(/\s|%/g,'').replace(',','.');
    state.balance = parseFloat(balRaw); if(!isFinite(state.balance)) state.balance = 0;
    state.pct     = parseFloat(pctRaw); if(!isFinite(state.pct))     state.pct     = 0;
    saveState(state); render(); closeEdit();
  });

  (function(){
    const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const standalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
    if(isiOS && !standalone && !localStorage.getItem('hide-install-hint')){
      setTimeout(()=> document.getElementById('installHint').classList.add('show'), 1500);
    }
    document.getElementById('closeHint').addEventListener('click', ()=>{
      document.getElementById('installHint').classList.remove('show');
      localStorage.setItem('hide-install-hint','1');
    });
  })();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>

<!-- Pull-to-refresh spinner -->
<div id="ptr" style="
  position:fixed;left:0;right:0;top:0;
  display:flex;justify-content:center;align-items:flex-end;
  height:0;pointer-events:none;z-index:90;
  transition:height .2s ease;
  padding-top:env(safe-area-inset-top);
">
  <div id="ptrSpinner" style="
    width:28px;height:28px;margin-bottom:8px;
    opacity:0;transition:opacity .15s ease;
  ">
    <svg viewBox="0 0 50 50" style="width:100%;height:100%;">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#9a9a9e" stroke-width="4"
        stroke-linecap="round" stroke-dasharray="80" stroke-dashoffset="40"
        transform="rotate(-90 25 25)">
        <animateTransform attributeName="transform" type="rotate"
          from="0 25 25" to="360 25 25" dur="0.9s" repeatCount="indefinite"/>
      </circle>
    </svg>
  </div>
</div>
<script>
(function(){
  const ptr = document.getElementById('ptr');
  const spinner = document.getElementById('ptrSpinner');
  const TRIGGER = 80;
  const MAX = 110;
  let startY = 0, pulling = false, currentPull = 0, refreshing = false;

  function atTop(){
    return (window.scrollY || document.documentElement.scrollTop || 0) <= 0;
  }

  document.addEventListener('touchstart', e => {
    if (refreshing) return;
    if (!atTop()) { pulling = false; return; }
    startY = e.touches[0].clientY;
    pulling = true;
    currentPull = 0;
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) { ptr.style.height = '0px'; spinner.style.opacity = '0'; return; }
    currentPull = Math.min(dy * 0.5, MAX);
    ptr.style.transition = 'none';
    ptr.style.height = currentPull + 'px';
    spinner.style.opacity = String(Math.min(1, currentPull / TRIGGER));
  }, {passive:true});

  document.addEventListener('touchend', () => {
    if (!pulling || refreshing) return;
    pulling = false;
    ptr.style.transition = 'height .2s ease';
    if (currentPull >= TRIGGER) {
      refreshing = true;
      ptr.style.height = '60px';
      spinner.style.opacity = '1';
      setTimeout(() => location.reload(), 350);
    } else {
      ptr.style.height = '0px';
      spinner.style.opacity = '0';
    }
  });
})();
</script>
</body>
</html>
